<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
  <nav class="navbar navbar-expand-lg navbar-dark app-nav" th:fragment="nav(showQuickSearch)">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/ket-qua}">
        <span class="brand-mark">TS</span>
        <span class="brand-text">Tuyển sinh 2026</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#appNav" aria-controls="appNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="appNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" th:href="@{/ket-qua}">Tra cứu</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/tinh-diem}">Tính điểm</a></li>
          <li class="nav-item" th:if="${showQuickSearch}"><a class="nav-link" th:href="@{/tra-cuu-nhanh}">Tra cứu nhanh</a></li>
        </ul>
        <div class="nav-meta d-flex align-items-center gap-3">
          <button id="btnThemeToggle" class="btn btn-outline-light btn-sm theme-toggle" type="button" aria-pressed="false" aria-label="Switch to dark mode">
            <span class="theme-toggle-track" aria-hidden="true">
              <span class="theme-toggle-thumb"></span>
            </span>
            <span class="theme-toggle-label">Light</span>
          </button>
            <span class="nav-user" th:if="${candidate != null}" th:text="${candidate.ho + ' ' + candidate.ten + ' - ' + candidate.cccd}">-</span>
            <span class="nav-user" th:if="${candidate == null}">Khách</span>
            <a class="btn btn-outline-light btn-sm" th:if="${candidate == null}" th:href="@{/}">Đăng nhập</a>
            <a class="btn btn-outline-light btn-sm" th:if="${candidate != null}" th:href="@{/logout}">Đăng xuất</a>
        </div>
      </div>
    </div>
  </nav>
</body>
</html>
