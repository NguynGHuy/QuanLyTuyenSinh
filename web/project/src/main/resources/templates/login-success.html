<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tuyển sinh 2026 | Đăng nhập thành công</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/Style/base.css}">
  <link rel="stylesheet" th:href="@{/Style/theme.css}">
  <link rel="stylesheet" th:href="@{/Style/components.css}">
  <link rel="stylesheet" th:href="@{/Style/pages.css}">
</head>
<body class="app-body auth-page auth-success-page" data-theme="sky">
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>

  <main class="app-main">
    <section class="auth-section">
      <div class="container">
        <div class="success-card mx-auto">
          <div class="success-icon">✓</div>
          <h1 class="h4 mb-2">Đăng nhập thành công</h1>
          <p class="text-muted mb-3">
            Xin chào
            <strong th:text="${candidate != null ? candidate.ho + ' ' + candidate.ten : 'Thí sinh'}">Thí sinh</strong>
          </p>
          <div class="d-flex align-items-center justify-content-center gap-2">
            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
            <span class="success-note">Đang chuyển đến trang kết quả...</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:inline="javascript">
    const nextUrl = /*[[@{/ket-qua}]]*/ "/ket-qua";
    window.setTimeout(() => {
      window.location.href = nextUrl;
    }, 1500);
  </script>
</body>
</html>
